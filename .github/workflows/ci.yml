name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      LOG_LEVEL: INFO
      CONN_MAX_AGE: "0"
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/webmenu_ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: webmenu_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d webmenu_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff
        run: ruff check .

      - name: Django check
        run: python manage.py check

      - name: Migration drift
        run: python manage.py makemigrations --check --dry-run

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Tests
        run: python manage.py test

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Compile Python
        run: python -m compileall .