{% load static %}
{% load i18n %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}КАКАО{% endblock %}</title>

  <!-- SEO -->
  <meta name="description" content="КАКАО — кофе и завтраки в Ашхабаде. Меню, адреса и контакты.">
  <meta name="keywords" content="кафе Ашхабад, завтраки Ашхабад, кофе Ашхабад, КАКАО кафе, меню кафе Туркменистан">

  <meta property="og:url" content="https://kakao.com.tm">
  <meta property="og:type" content="restaurant">

          }

        "sameAs": ["https://instagram.com/kakao.breakfast/"]
      },
      {
        "@type": "CafeOrCoffeeShop",
        "name": "КАКАО",
        "image": "https://kakao.com.tm/static/favicon.png",
        "url": "https://kakao.com.tm",
        "telephone": "+99362772758",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Мир 4, дом 7",
          "addressLocality": "Ашхабад",
          "addressCountry": "TM"
        },

          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "08:00",
            "closes": "23:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Sunday",
            "opens": "09:00",
            "closes": "23:00"
          }
        ],
        "sameAs": ["https://instagram.com/kakao.breakfast/"]
      }
    ]
  }
  </script>

  <link rel="stylesheet" href="{% static 'menu/css/theme.css' %}">
  <link rel="stylesheet" href="{% static 'menu/css/style.css' %}">
  <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
  {% block extra_css %}{% endblock %}

  <!-- Canonical и hreflang -->
  <link rel="canonical" href="https://kakao.com.tm/ru{{ request.path|slice:'3:' }}">
  <link rel="alternate" hreflang="ru" href="https://kakao.com.tm/ru{{ request.path|slice:'3:' }}">
  <link rel="alternate" hreflang="en" href="https://kakao.com.tm/en{{ request.path|slice:'3:' }}">
  <link rel="alternate" hreflang="tk" href="https://kakao.com.tm/tk{{ request.path|slice:'3:' }}">
  <link rel="alternate" hreflang="x-default" href="https://kakao.com.tm/ru{{ request.path|slice:'3:' }}">

  <!-- Yandex.Metrika counter -->
  <script type="text/javascript">
    (function(m,e,t,r,i,k,a){
      m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
      m[i].l=1*new Date();
      for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}
      k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
    })(window,document,'script','https://mc.yandex.ru/metrika/tag.js?id=109742051','ym');
    ym(109742051,'init',{ssr:true,webvisor:true,clickmap:true,ecommerce:"dataLayer",referrer:document.referrer,url:location.href,accurateTrackBounce:true,trackLinks:true});

</head>

<body>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__logo">
        <img src="{% static 'menu/images/logomark_color_descriptor.png' %}" alt="КАКАО" class="site-footer__logo-img">
      </div>
      <div class="site-footer__contacts">
        <div class="site-footer__location">
          <p class="site-footer__address">Мир 4, Parahat базар</p>
          <a href="tel:+99364359789" class="site-footer__phone" onclick="track('phone_call',{source:'footer'})">+993 64 359786</a>
        </div>
        <div class="site-footer__location">
          <p class="site-footer__address">Мир 4, дом 7</p>
          <a href="tel:+99362772758" class="site-footer__phone" onclick="track('phone_call',{source:'footer'})">+993 62 772758</a>
        </div>
      </div>
    </div>
  </footer>

  {% block extra_js %}{% endblock %}
<script>
  function track(goal, params) {
    if (typeof ym === 'function') ym(109742051, 'reachGoal', goal, params || {});
  }

  const langBtn = document.getElementById('langBtn');
  const langDropdown = document.getElementById('langDropdown');

  if (langBtn && langDropdown) {
    langBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      langDropdown.classList.toggle('open');
    });

    document.addEventListener('click', function() {
      langDropdown.classList.remove('open');
    });
  }
</script>
</body>
</html>
