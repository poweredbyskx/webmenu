{% load static %}
{% load i18n %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}КАКАО{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'menu/css/theme.css' %}">
  <link rel="stylesheet" href="{% static 'menu/css/style.css' %}">
  <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
  {% block extra_css %}{% endblock %}
</head>

<body>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__logo">
        <img src="{% static 'menu/images/logomark_color_descriptor.png' %}" alt="КАКАО" class="site-footer__logo-img">
      </div>
      <div class="site-footer__contacts">
        <div class="site-footer__location">
          <p class="site-footer__address">Мир 4, Parahat базар</p>
          <a href="tel:+99364359789" class="site-footer__phone">+993 64 359789</a>
        </div>
        <div class="site-footer__location">
          <p class="site-footer__address">Мир 4, дом 7</p>
          <a href="tel:+99362772758" class="site-footer__phone">+993 62 772758</a>
        </div>
      </div>
    </div>
  </footer>

  {% block extra_js %}{% endblock %}

</body>
</html>
